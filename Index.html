<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Negocio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCex3VDJlBxXJp108NUSwf7w-Thh20jCDk",
    authDomain: "legionarias-arg-sg.firebaseapp.com",
    projectId: "legionarias-arg-sg",
    storageBucket: "legionarias-arg-sg.firebasestorage.app",
    messagingSenderId: "234231504038",
    appId: "1:234231504038:web:f9169f1bd6275e9eb1a867"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const ref = doc(db, "negocio", "data");

  window.__fbListeners = [];
  window.__fbReady = false;

  onSnapshot(ref, snap => {
    window.__fbData  = snap.exists() ? snap.data() : null;
    window.__fbReady = true;
    window.__fbListeners.forEach(fn => fn(window.__fbData));
  });

  window.__fbSave = data => setDoc(ref, data);

  window.__fbSubscribe = fn => {
    window.__fbListeners.push(fn);
    if (window.__fbReady) fn(window.__fbData);
  };
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#FAF7F7}
input,select{padding:9px 12px;border-radius:8px;border:1px solid #E5E0E0;font-size:14px;outline:none;background:#fff;color:#111;width:100%;font-family:inherit}
input:focus,select:focus{border-color:#C0525F}
button{font-family:inherit;cursor:pointer}
table{border-collapse:collapse}
a{color:#1A5FA8;text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#E5E0E0;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const C={bordo:"#6B1F2A",bordoD:"#4A1219",bordoL:"#8B2535",bordoXL:"#F9EEF0",bordoBorder:"#C0525F",white:"#FFFFFF",offwhite:"#FAF7F7",gray:"#6B7280",grayL:"#F5F2F2",grayB:"#E5E0E0",success:"#1A7F4E",successBg:"#E8F5EE",danger:"#C0152A",dangerBg:"#FCECEA",warning:"#92600A",warningBg:"#FEF3E2",info:"#1A5FA8",infoBg:"#E8F0FB"};
const fmt=n=>Number(n).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI=n=>Number(n).toLocaleString("es-AR");
const today=()=>new Date().toISOString().split("T")[0];
const inp={padding:"9px 12px",borderRadius:8,border:`1px solid ${C.grayB}`,fontSize:14,outline:"none",background:C.white,color:"#111",width:"100%",boxSizing:"border-box",fontFamily:"inherit"};
const btnP={padding:"9px 20px",borderRadius:8,border:"none",background:C.bordo,color:C.white,fontSize:14,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"};
const btnS={padding:"6px 14px",borderRadius:6,border:`1px solid ${C.grayB}`,background:C.white,color:"#444",fontSize:13,cursor:"pointer"};
const btnD={...btnS,color:C.danger,borderColor:"#FBCDD0"};
const TABS=[{id:"Dashboard",icon:"◈"},{id:"Stock",icon:"▦"},{id:"Ventas",icon:"◉"},{id:"Movimientos",icon:"⇄"},{id:"Deudas",icon:"⚑"},{id:"Gráficos",icon:"▲"},{id:"Categorías",icon:"⊞"}];
const DEF={products:[],transactions:[],debts:[],cats:{ingreso:["Venta","Otro ingreso","Préstamo recibido","Cobro de deuda"],egreso:["Proveedor","Alquiler","Servicios","Sueldos","Impuestos","Otro egreso"],stock:["General","Ropa","Electrónica","Alimentos","Otros"]}};

function App(){
  const [tab,setTab]=useState("Dashboard");
  const [data,setData]=useState(null);
  const [saving,setSaving]=useState(false);
  const [mini,setMini]=useState(false);
  useEffect(()=>{window.__fbSubscribe(d=>{if(d){if(!d.cats?.stock)d.cats={...DEF.cats,...d.cats,stock:DEF.cats.stock};setData(d);}else setData(DEF);});},[]);
  const save=async next=>{setData(next);setSaving(true);try{await window.__fbSave(next);}catch(e){alert("Error: "+e.message);}setSaving(false);};
  const exportCSV=()=>{const rows=[["Tipo","Descripcion","Categoria","Bruto","Descuento","Neto","Fecha"],...data.transactions.map(t=>[t.type,t.desc||"",t.category,t.bruto||t.amount,t.descuento||0,t.amount,t.date])];const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"}));a.download="movimientos.csv";a.click();};
  if(!data)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:C.gray}}><div style={{fontSize:40,animation:"spin 1s linear infinite"}}>⟳</div><div>Conectando con la base de datos...</div><style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style></div>;
  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.offwhite}}>
      <nav style={{width:mini?52:190,background:C.bordoD,flexShrink:0,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",transition:"width .15s"}}>
        <div style={{padding:"14px 10px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.bordoL}`}}>
          <button onClick={()=>setMini(!mini)} style={{background:"none",border:"none",color:C.white,fontSize:18,cursor:"pointer",padding:0}}>☰</button>
          {!mini&&<span style={{color:C.white,fontWeight:600,fontSize:15,whiteSpace:"nowrap"}}>Mi Negocio</span>}
        </div>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} title={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:tab===t.id?C.bordo:"transparent",border:"none",borderLeft:tab===t.id?`3px solid #F9B9C0`:"3px solid transparent",color:tab===t.id?C.white:"rgba(255,255,255,.65)",fontSize:14,cursor:"pointer",textAlign:"left",whiteSpace:"nowrap",overflow:"hidden"}}><span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>{!mini&&<span>{t.id}</span>}</button>)}
        <div style={{flex:1}}/>
        {saving&&!mini&&<div style={{margin:"0 10px 4px",fontSize:12,color:"rgba(255,255,255,.5)",textAlign:"center"}}>Guardando...</div>}
        {!mini&&<button onClick={exportCSV} style={{margin:"0 10px 14px",padding:"9px 10px",borderRadius:8,border:`1px solid ${C.bordoL}`,background:"transparent",color:"rgba(255,255,255,.75)",fontSize:13,cursor:"pointer"}}>↓ Exportar CSV</button>}
      </nav>
      <main style={{flex:1,padding:"1.25rem",overflowY:"auto"}}>
        {tab==="Dashboard"&&<Dashboard data={data}/>}
        {tab==="Stock"&&<Stock data={data} save={save}/>}
        {tab==="Ventas"&&<Ventas data={data} save={save}/>}
        {tab==="Movimientos"&&<Movs data={data} save={save}/>}
        {tab==="Deudas"&&<Deudas data={data} save={save}/>}
        {tab==="Gráficos"&&<Graficos data={data}/>}
        {tab==="Categorías"&&<Categorias data={data} save={save}/>}
      </main>
    </div>
  );
}

function Ttl({children}){return <h2 style={{fontSize:19,fontWeight:600,color:C.bordoD,marginBottom:"1.1rem",marginTop:0}}>{children}</h2>;}
function Card({title,children,accent}){return <div style={{background:C.white,border:`1px solid ${accent?C.bordoBorder:C.grayB}`,borderRadius:12,padding:"1rem 1.2rem",marginBottom:"1.2rem"}}>{title&&<div style={{fontSize:12,fontWeight:500,color:accent?C.bordo:C.gray,marginBottom:10,textTransform:"uppercase",letterSpacing:".04em"}}>{title}</div>}{children}</div>;}
function KPI({label,value,sub,color,bg}){return <div style={{background:bg||C.grayL,borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:12,color:C.gray,marginBottom:4}}>{label}</div><div style={{fontSize:20,fontWeight:600,color:color||C.bordoD}}>{value}</div>{sub&&<div style={{fontSize:11,color:C.gray,marginTop:3}}>{sub}</div>}</div>;}
function Fld({label,children}){return <div><label style={{display:"block",fontSize:12,color:C.gray,marginBottom:4,fontWeight:500}}>{label}</label>{children}</div>;}
function R2({label,value,color,bold}){return <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}><span style={{color:C.gray}}>{label}</span><span style={{color:color||"#111",fontWeight:bold?600:400}}>{value}</span></div>;}
function Empty({text}){return <div style={{color:C.gray,fontSize:13,padding:"1.2rem 0",textAlign:"center"}}>{text}</div>;}
function SLbl({children}){return <div style={{marginBottom:8,fontSize:12,fontWeight:500,color:C.gray,textTransform:"uppercase",letterSpacing:".04em"}}>{children}</div>;}
function TxRow({tx,onDel}){const bruto=tx.bruto||tx.amount,desc=tx.descuento||0;return <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 13px",background:C.white,border:`1px solid ${C.grayB}`,borderLeft:`3px solid ${tx.type==="ingreso"?C.success:C.danger}`,borderRadius:10,marginBottom:7}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{tx.desc||tx.category}</div><div style={{fontSize:12,color:C.gray}}>{tx.category} · {tx.date}</div>{desc>0&&<div style={{fontSize:11,color:C.gray,marginTop:2}}>Bruto: ${fmt(bruto)} · Desc: ${fmt(desc)}</div>}</div><div style={{textAlign:"right"}}><div style={{fontWeight:600,color:tx.type==="ingreso"?C.success:C.danger}}>{tx.type==="ingreso"?"+":"-"}${fmt(tx.amount)}</div>{desc>0&&<div style={{fontSize:11,color:C.gray}}>neto</div>}</div>{onDel&&<button style={btnD} onClick={()=>onDel(tx.id)}>×</button>}</div>;}
function Toggle({options,value,onChange}){return <div style={{display:"flex",gap:6}}>{options.map(o=><button key={o.v} onClick={()=>onChange(o.v)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${value===o.v?C.bordo:C.grayB}`,background:value===o.v?C.bordo:C.white,color:value===o.v?C.white:"#444",fontSize:13,cursor:"pointer",fontWeight:value===o.v?500:400}}>{o.l}</button>)}</div>;}

function Dashboard({data}){
  const {products,transactions,debts}=data;
  const ingB=transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+(t.bruto||t.amount),0);
  const ing=transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+Number(t.amount),0);
  const egr=transactions.filter(t=>t.type==="egreso").reduce((s,t)=>s+Number(t.amount),0);
  const vB=transactions.filter(t=>t.category==="Venta").reduce((s,t)=>s+(t.bruto||t.amount),0);
  const vN=transactions.filter(t=>t.category==="Venta").reduce((s,t)=>s+Number(t.amount),0);
  const cobrar=debts.filter(d=>d.kind==="cobrar"&&d.status==="pendiente").reduce((s,d)=>s+Number(d.amount),0);
  const pagar=debts.filter(d=>d.kind==="pagar"&&d.status==="pendiente").reduce((s,d)=>s+Number(d.amount),0);
  const sv=products.reduce((s,p)=>s+p.stock*p.cost,0);
  const bajo=products.filter(p=>p.stock<=(p.minStock||5));
  return <div>
    <Ttl>Dashboard</Ttl>
    <SLbl>Resumen general</SLbl>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.2rem"}}>
      <KPI label="Valor en stock" value={`$${fmt(sv)}`}/>
      <KPI label="Balance neto" value={`$${fmt(ing-egr)}`} color={(ing-egr)>=0?C.success:C.danger} bg={(ing-egr)>=0?C.successBg:C.dangerBg}/>
      <KPI label="A cobrar" value={`$${fmt(cobrar)}`} color={C.info} bg={C.infoBg}/>
      <KPI label="A pagar" value={`$${fmt(pagar)}`} color={C.danger} bg={C.dangerBg}/>
    </div>
    <SLbl>Ingresos</SLbl>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.2rem"}}>
      <KPI label="Ingresos brutos" value={`$${fmt(ingB)}`} color={C.bordoD} sub="antes de descuentos"/>
      <KPI label="Ingresos netos" value={`$${fmt(ing)}`} color={C.success} bg={C.successBg} sub="después de descuentos"/>
      <KPI label="Descuentos" value={`$${fmt(ingB-ing)}`} color={C.warning} bg={C.warningBg}/>
      <KPI label="Egresos" value={`$${fmt(egr)}`} color={C.danger} bg={C.dangerBg}/>
    </div>
    <SLbl>Ventas</SLbl>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:"1.2rem"}}>
      <KPI label="Ventas brutas" value={`$${fmt(vB)}`} color={C.bordoD} sub="precio lista"/>
      <KPI label="Ventas netas" value={`$${fmt(vN)}`} color={C.success} bg={C.successBg} sub="con descuentos"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12}}>
      <Card title="Flujo de dinero">
        <R2 label="Ing. brutos" value={`$${fmt(ingB)}`} color={C.bordoD}/>
        <R2 label="Descuentos" value={`-$${fmt(ingB-ing)}`} color={C.warning}/>
        <R2 label="Ing. netos" value={`$${fmt(ing)}`} color={C.success} bold/>
        <div style={{borderTop:`1px solid ${C.grayB}`,marginTop:7,paddingTop:7}}>
          <R2 label="Egresos" value={`-$${fmt(egr)}`} color={C.danger}/>
          <R2 label="Balance" value={`$${fmt(ing-egr)}`} color={(ing-egr)>=0?C.success:C.danger} bold/>
        </div>
      </Card>
      <Card title="Top stock">{products.length===0?<Empty text="Sin productos."/>:products.slice().sort((a,b)=>b.stock-a.stock).slice(0,5).map(p=><R2 key={p.id} label={p.name} value={`${fmtI(p.stock)} u`} color={p.stock<=(p.minStock||5)?C.danger:C.gray}/>)}</Card>
      {bajo.length>0&&<Card title="⚠ Stock bajo">{bajo.map(p=><div key={p.id} style={{fontSize:13,color:C.warning,marginBottom:4}}>{p.name} — {fmtI(p.stock)} u (mín {p.minStock||5})</div>)}</Card>}
      <Card title="Últimos movimientos">{transactions.length===0?<Empty text="Sin movimientos."/>:[...transactions].reverse().slice(0,5).map(t=><TxRow key={t.id} tx={t}/>)}</Card>
    </div>
  </div>;
}

function Stock({data,save}){
  const emp={name:"",cost:"",price:"",stock:"",minStock:"",img:"",link:"",categoria:""};
  const [form,setForm]=useState(emp);
  const [editId,setEditId]=useState(null);
  const [err,setErr]=useState("");
  const [q,setQ]=useState("");
  const [catF,setCatF]=useState("Todas");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const cats=data.cats?.stock||DEF.cats.stock;
  const submit=()=>{
    if(!form.name.trim()||form.cost===""||form.stock===""){setErr("Completá nombre, costo y cantidad.");return;}
    const prod={id:editId||Date.now(),name:form.name.trim(),cost:Number(form.cost),price:Number(form.price||0),stock:Number(form.stock),minStock:Number(form.minStock||5),sold:editId?(data.products.find(p=>p.id===editId)?.sold||0):0,img:form.img.trim(),link:form.link.trim(),categoria:form.categoria};
    save({...data,products:editId?data.products.map(p=>p.id===editId?prod:p):[...data.products,prod]});
    setForm(emp);setEditId(null);setErr("");
  };
  const shown=data.products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).filter(p=>catF==="Todas"||(p.categoria||"")===catF);
  return <div>
    <Ttl>Stock</Ttl>
    <Card title={editId?"Editar producto":"Nuevo producto"} accent>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
        <Fld label="Nombre *"><input style={inp} value={form.name} onChange={e=>f("name",e.target.value)} placeholder="Ej: Remera M"/></Fld>
        <Fld label="Categoría"><select style={inp} value={form.categoria} onChange={e=>f("categoria",e.target.value)}><option value="">Sin categoría</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select></Fld>
        <Fld label="Costo *"><input style={inp} type="number" value={form.cost} onChange={e=>f("cost",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Precio venta"><input style={inp} type="number" value={form.price} onChange={e=>f("price",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Cantidad *"><input style={inp} type="number" value={form.stock} onChange={e=>f("stock",e.target.value)} placeholder="0"/></Fld>
        <Fld label="Stock mínimo"><input style={inp} type="number" value={form.minStock} onChange={e=>f("minStock",e.target.value)} placeholder="5"/></Fld>
        <Fld label="Foto">
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <label style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${C.grayB}`,background:C.white,color:"#444",fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>📁 Archivo<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>f("img",ev.target.result);r.readAsDataURL(file);}}/></label>
              {form.img&&<button style={{...btnD,fontSize:12}} onClick={()=>f("img","")}>Quitar</button>}
            </div>
            <input style={inp} value={form.img.startsWith("data:")?"":form.img} onChange={e=>f("img",e.target.value)} placeholder="O pegá una URL (https://...)"/>
            {form.img&&<img src={form.img} alt="preview" style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:`1px solid ${C.grayB}`}} onError={e=>e.target.style.display="none"}/>}
          </div>
        </Fld>
        <Fld label="Enlace"><input style={inp} value={form.link} onChange={e=>f("link",e.target.value)} placeholder="https://..."/></Fld>
      </div>
      {err&&<div style={{color:C.danger,fontSize:13,marginTop:7}}>{err}</div>}
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button style={btnP} onClick={submit}>{editId?"Guardar":"Agregar producto"}</button>
        {editId&&<button style={btnS} onClick={()=>{setForm(emp);setEditId(null);setErr("");}}>Cancelar</button>}
      </div>
    </Card>
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
      <input style={{...inp,maxWidth:220}} placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)}/>
      <select style={{...inp,maxWidth:160}} value={catF} onChange={e=>setCatF(e.target.value)}><option value="Todas">Todas las categorías</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <span style={{fontSize:13,color:C.gray}}>{shown.length} producto{shown.length!==1?"s":""}</span>
    </div>
    {shown.length===0?<Empty text="Sin productos."/>:(
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,background:C.white,borderRadius:10,overflow:"hidden"}}>
          <thead><tr style={{background:C.bordoXL}}>{["","Producto","Cat.","Costo","Precio","Stock","Vendidas","Margen",""].map(h=><th key={h} style={{padding:"9px 11px",textAlign:"left",fontWeight:500,color:C.bordoD,fontSize:12}}>{h}</th>)}</tr></thead>
          <tbody>{shown.map((p,i)=>{
            const mg=p.price>0?((p.price-p.cost)/p.cost*100).toFixed(1):null;
            return <tr key={p.id} style={{borderBottom:`1px solid ${C.grayL}`,background:i%2===0?C.white:C.offwhite}}>
              <td style={{padding:"6px 11px"}}>{p.img?<img src={p.img} alt={p.name} style={{width:40,height:40,objectFit:"cover",borderRadius:8,border:`1px solid ${C.grayB}`,display:"block"}} onError={e=>e.target.style.display="none"}/>:<div style={{width:40,height:40,borderRadius:8,background:C.bordoXL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:C.bordoBorder}}>▦</div>}</td>
              <td style={{padding:"9px 11px",fontWeight:500}}>{p.name}{p.link&&<><br/><a href={p.link} target="_blank" style={{fontSize:11}}>↗ Ver enlace</a></>}</td>
              <td style={{padding:"9px 11px"}}>{p.categoria?<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:C.bordoXL,color:C.bordo}}>{p.categoria}</span>:"—"}</td>
              <td style={{padding:"9px 11px"}}>${fmt(p.cost)}</td>
              <td style={{padding:"9px 11px"}}>{p.price?`$${fmt(p.price)}`:"—"}</td>
              <td style={{padding:"9px 11px"}}><span style={{color:p.stock<=p.minStock?C.danger:C.success,fontWeight:600}}>{fmtI(p.stock)}</span>{p.stock<=p.minStock&&<span style={{marginLeft:5,fontSize:10,background:C.dangerBg,color:C.danger,padding:"2px 5px",borderRadius:4}}>bajo</span>}</td>
              <td style={{padding:"9px 11px"}}>{fmtI(p.sold||0)}</td>
              <td style={{padding:"9px 11px",color:mg?(Number(mg)>0?C.success:C.danger):C.gray}}>{mg?`${mg}%`:"—"}</td>
              <td style={{padding:"9px 11px"}}><div style={{display:"flex",gap:5}}>
                <button style={btnS} onClick={()=>{setForm({name:p.name,cost:p.cost,price:p.price,stock:p.stock,minStock:p.minStock,img:p.img||"",link:p.link||"",categoria:p.categoria||""});setEditId(p.id);}}>Editar</button>
                <button style={btnD} onClick={()=>{if(confirm("¿Eliminar?"))save({...data,products:data.products.filter(x=>x.id!==p.id)});}}>Eliminar</button>
              </div></td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    )}
  </div>;
}

function Ventas({data,save}){
  const [form,setForm]=useState({productId:"",qty:"",price:"",descuento:"",date:today(),note:""});
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const sel2=data.products.find(p=>p.id===Number(form.productId));
  const bruto=Number(form.price||sel2?.price||0)*Number(form.qty||0);
  const desc=Number(form.descuento||0);
  const neto=bruto-desc;
  const submit=()=>{
    if(!form.productId||!form.qty){setErr("Seleccioná producto y cantidad.");return;}
    const qty=Number(form.qty);
    if(!sel2||qty>sel2.stock){setErr(`Stock insuficiente. Disponible: ${fmtI(sel2?.stock||0)}.`);return;}
    if(qty<=0){setErr("Cantidad inválida.");return;}
    if(desc<0||desc>bruto){setErr("Descuento inválido.");return;}
    const price=Number(form.price||sel2.price||0);
    const products=data.products.map(p=>p.id===sel2.id?{...p,stock:p.stock-qty,sold:(p.sold||0)+qty}:p);
    const tx=price>0?[...data.transactions,{id:Date.now(),type:"ingreso",bruto:price*qty,descuento:desc,amount:neto,category:"Venta",desc:`${sel2.name} x${qty}${form.note?" — "+form.note:""}`,date:form.date}]:data.transactions;
    save({...data,products,transactions:tx});
    setForm({productId:"",qty:"",price:"",descuento:"",date:today(),note:""});setErr("");
  };
  return <div>
    <Ttl>Ventas</Ttl>
    <Card title="Nueva venta" accent>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        <Fld label="Producto *"><select style={inp} value={form.productId} onChange={e=>{const p=data.products.find(x=>x.id===Number(e.target.value));f("productId",e.target.value);if(p)f("price",p.price||"");}}><option value="">Seleccionar...</option>{data.products.filter(p=>p.stock>0).map(p=><option key={p.id} value={p.id}>{p.name} (stock: {fmtI(p.stock)})</option>)}</select></Fld>
        <Fld label="Cantidad *"><input style={inp} type="number" min="1" value={form.qty} onChange={e=>f("qty",e.target.value)} placeholder="0"/>{sel2&&<div style={{fontSize:12,color:C.gray,marginTop:3}}>Disponible: {fmtI(sel2.stock)}</div>}</Fld>
        <Fld label="Precio unitario"><input style={inp} type="number" value={form.price} onChange={e=>f("price",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Descuento ($)"><input style={inp} type="number" value={form.descuento} onChange={e=>f("descuento",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Fecha"><input style={inp} type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></Fld>
        <Fld label="Nota"><input style={inp} value={form.note} onChange={e=>f("note",e.target.value)} placeholder="Cliente, detalle..."/></Fld>
      </div>
      {form.productId&&form.qty&&<div style={{marginTop:10,padding:"10px 14px",background:C.bordoXL,borderRadius:8,fontSize:13,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8}}><div>Bruto: <strong style={{color:C.bordoD}}>${fmt(bruto)}</strong></div><div>Descuento: <strong style={{color:C.warning}}>-${fmt(desc)}</strong></div><div>Neto: <strong style={{color:C.success,fontSize:15}}>${fmt(neto)}</strong></div></div>}
      {err&&<div style={{color:C.danger,fontSize:13,marginTop:7}}>{err}</div>}
      <button style={{...btnP,marginTop:10}} onClick={submit}>Confirmar venta</button>
    </Card>
    <h3 style={{fontSize:15,fontWeight:500,marginBottom:10}}>Historial ({data.transactions.filter(t=>t.category==="Venta").length})</h3>
    {data.transactions.filter(t=>t.category==="Venta").length===0?<Empty text="Sin ventas."/>:[...data.transactions].filter(t=>t.category==="Venta").reverse().map(t=><TxRow key={t.id} tx={t}/>)}
  </div>;
}

function Movs({data,save}){
  const cats=data.cats||DEF.cats;
  const [form,setForm]=useState({type:"ingreso",amount:"",bruto:"",descuento:"",category:"",desc:"",date:today()});
  const [err,setErr]=useState("");
  const [filt,setFilt]=useState("todos");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!form.amount||!form.category){setErr("Completá monto y categoría.");return;}
    if(Number(form.amount)<=0){setErr("El monto debe ser mayor a 0.");return;}
    save({...data,transactions:[...data.transactions,{id:Date.now(),type:form.type,bruto:Number(form.bruto||form.amount),descuento:Number(form.descuento||0),amount:Number(form.amount),category:form.category,desc:form.desc,date:form.date}]});
    setForm(p=>({...p,amount:"",bruto:"",descuento:"",category:"",desc:""}));setErr("");
  };
  const del=id=>save({...data,transactions:data.transactions.filter(t=>t.id!==id)});
  const ingB=data.transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+(t.bruto||t.amount),0);
  const ing=data.transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+Number(t.amount),0);
  const egr=data.transactions.filter(t=>t.type==="egreso").reduce((s,t)=>s+Number(t.amount),0);
  const shown=[...data.transactions].reverse().filter(t=>filt==="todos"||t.type===filt);
  return <div>
    <Ttl>Movimientos</Ttl>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:"1.1rem"}}>
      <KPI label="Ing. brutos" value={`$${fmt(ingB)}`} color={C.bordoD} sub="antes de desc."/>
      <KPI label="Ing. netos" value={`$${fmt(ing)}`} color={C.success} bg={C.successBg} sub="después de desc."/>
      <KPI label="Egresos" value={`$${fmt(egr)}`} color={C.danger} bg={C.dangerBg}/>
      <KPI label="Balance" value={`$${fmt(ing-egr)}`} color={(ing-egr)>=0?C.success:C.danger} bg={(ing-egr)>=0?C.successBg:C.dangerBg}/>
    </div>
    <Card title="Registrar movimiento" accent>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
        <Fld label="Tipo"><Toggle options={[{v:"ingreso",l:"+ Ingreso"},{v:"egreso",l:"- Egreso"}]} value={form.type} onChange={v=>f("type",v)}/></Fld>
        {form.type==="ingreso"&&<Fld label="Monto bruto"><input style={inp} type="number" value={form.bruto} onChange={e=>f("bruto",e.target.value)} placeholder="0.00"/></Fld>}
        {form.type==="ingreso"&&<Fld label="Descuento ($)"><input style={inp} type="number" value={form.descuento} onChange={e=>f("descuento",e.target.value)} placeholder="0.00"/></Fld>}
        <Fld label={form.type==="ingreso"?"Monto neto *":"Monto *"}><input style={inp} type="number" value={form.amount} onChange={e=>f("amount",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Categoría *"><select style={inp} value={form.category} onChange={e=>f("category",e.target.value)}><option value="">Seleccionar...</option>{(cats[form.type]||[]).map(c=><option key={c} value={c}>{c}</option>)}</select></Fld>
        <Fld label="Descripción"><input style={inp} value={form.desc} onChange={e=>f("desc",e.target.value)} placeholder="Detalle..."/></Fld>
        <Fld label="Fecha"><input style={inp} type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></Fld>
      </div>
      {err&&<div style={{color:C.danger,fontSize:13,marginTop:7}}>{err}</div>}
      <button style={{...btnP,marginTop:10}} onClick={submit}>Registrar</button>
    </Card>
    <div style={{display:"flex",gap:7,marginBottom:10}}>{["todos","ingreso","egreso"].map(v=><button key={v} onClick={()=>setFilt(v)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${filt===v?C.bordo:C.grayB}`,background:filt===v?C.bordo:C.white,color:filt===v?C.white:"#444",fontSize:13,cursor:"pointer"}}>{v==="todos"?"Todos":v==="ingreso"?"Ingresos":"Egresos"}</button>)}</div>
    {shown.length===0?<Empty text="Sin movimientos."/>:shown.map(t=><TxRow key={t.id} tx={t} onDel={del}/>)}
  </div>;
}

function Deudas({data,save}){
  const [form,setForm]=useState({kind:"cobrar",who:"",amount:"",desc:"",date:today(),due:""});
  const [err,setErr]=useState("");
  const [tab,setTab]=useState("cobrar");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!form.who.trim()||!form.amount){setErr("Completá nombre y monto.");return;}
    save({...data,debts:[...data.debts,{id:Date.now(),kind:form.kind,who:form.who.trim(),amount:Number(form.amount),desc:form.desc,date:form.date,due:form.due,status:"pendiente"}]});
    setForm(p=>({...p,who:"",amount:"",desc:"",due:""}));setErr("");
  };
  const toggle=id=>save({...data,debts:data.debts.map(d=>d.id===id?{...d,status:d.status==="pendiente"?"pagado":"pendiente"}:d)});
  const del=id=>save({...data,debts:data.debts.filter(d=>d.id!==id)});
  const items=data.debts.filter(d=>d.kind===tab);
  const pend=items.filter(d=>d.status==="pendiente").reduce((s,d)=>s+d.amount,0);
  const hoy=today();
  return <div>
    <Ttl>Deudas</Ttl>
    <Card title="Registrar deuda" accent>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
        <Fld label="Tipo"><Toggle options={[{v:"cobrar",l:"A cobrar"},{v:"pagar",l:"A pagar"}]} value={form.kind} onChange={v=>f("kind",v)}/></Fld>
        <Fld label="Nombre *"><input style={inp} value={form.who} onChange={e=>f("who",e.target.value)} placeholder="Ej: Juan García"/></Fld>
        <Fld label="Monto *"><input style={inp} type="number" value={form.amount} onChange={e=>f("amount",e.target.value)} placeholder="0.00"/></Fld>
        <Fld label="Descripción"><input style={inp} value={form.desc} onChange={e=>f("desc",e.target.value)} placeholder="Concepto..."/></Fld>
        <Fld label="Fecha"><input style={inp} type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></Fld>
        <Fld label="Vencimiento"><input style={inp} type="date" value={form.due} onChange={e=>f("due",e.target.value)}/></Fld>
      </div>
      {err&&<div style={{color:C.danger,fontSize:13,marginTop:7}}>{err}</div>}
      <button style={{...btnP,marginTop:10}} onClick={submit}>Agregar deuda</button>
    </Card>
    <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:10}}>
      {["cobrar","pagar"].map(k=><button key={k} onClick={()=>setTab(k)} style={{padding:"5px 16px",borderRadius:20,border:`1px solid ${tab===k?C.bordo:C.grayB}`,background:tab===k?C.bordo:C.white,color:tab===k?C.white:"#444",fontSize:13,cursor:"pointer"}}>{k==="cobrar"?"A cobrar":"A pagar"}</button>)}
      <span style={{marginLeft:"auto",fontSize:13,fontWeight:500,color:tab==="cobrar"?C.info:C.danger}}>Pendiente: ${fmt(pend)}</span>
    </div>
    {items.length===0?<Empty text="Sin registros."/>:items.map(d=>{
      const venc=d.due&&d.due<hoy&&d.status==="pendiente";
      return <div key={d.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 13px",background:C.white,border:`1px solid ${venc?C.bordoBorder:C.grayB}`,borderRadius:10,marginBottom:8,opacity:d.status==="pagado"?.55:1}}>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,textDecoration:d.status==="pagado"?"line-through":"none"}}>{d.who}</div>{d.desc&&<div style={{fontSize:12,color:C.gray,marginTop:2}}>{d.desc}</div>}<div style={{fontSize:12,color:C.gray,marginTop:2}}>{d.date}{d.due&&<> · Vence: <span style={{color:venc?C.danger:C.gray,fontWeight:venc?600:400}}>{d.due}{venc?" ⚠":""}</span></>}</div></div>
        <div style={{fontWeight:600,fontSize:14,color:tab==="cobrar"?C.info:C.danger,whiteSpace:"nowrap"}}>${fmt(d.amount)}</div>
        <span style={{fontSize:11,padding:"3px 7px",borderRadius:5,background:d.status==="pagado"?C.successBg:C.warningBg,color:d.status==="pagado"?C.success:C.warning,whiteSpace:"nowrap"}}>{d.status}</span>
        <button style={{...btnS,fontSize:12}} onClick={()=>toggle(d.id)}>{d.status==="pendiente"?"✓ Pagado":"Reabrir"}</button>
        <button style={btnD} onClick={()=>del(d.id)}>×</button>
      </div>;
    })}
  </div>;
}

function Categorias({data,save}){
  const cats=data.cats||DEF.cats;
  const [tab,setTab]=useState("ingreso");
  const [nueva,setNueva]=useState("");
  const [err,setErr]=useState("");
  const TIPOS=[{v:"ingreso",l:"Ingresos",color:C.success,bg:C.successBg,border:"#B6DFC9"},{v:"egreso",l:"Egresos",color:C.danger,bg:C.dangerBg,border:"#FBCDD0"},{v:"stock",l:"Stock",color:C.bordo,bg:C.bordoXL,border:C.bordoBorder}];
  const agregar=()=>{const n=nueva.trim();if(!n){setErr("Escribí un nombre.");return;}if((cats[tab]||[]).includes(n)){setErr("Ya existe.");return;}save({...data,cats:{...cats,[tab]:[...(cats[tab]||[]),n]}});setNueva("");setErr("");};
  const eliminar=(tipo,cat)=>{const usada=tipo==="stock"?data.products.some(p=>p.categoria===cat):data.transactions.some(t=>t.type===tipo&&t.category===cat);if(usada&&!confirm(`"${cat}" está en uso. ¿Eliminar igual?`))return;save({...data,cats:{...cats,[tipo]:(cats[tipo]||[]).filter(c=>c!==cat)}});};
  return <div>
    <Ttl>Categorías</Ttl>
    <Card title="Nueva categoría" accent>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{minWidth:240}}><Fld label="Tipo"><div style={{display:"flex",gap:6}}>{TIPOS.map(t=><button key={t.v} onClick={()=>{setTab(t.v);setErr("");}} style={{flex:1,padding:"8px 6px",borderRadius:8,border:`1px solid ${tab===t.v?C.bordo:C.grayB}`,background:tab===t.v?C.bordo:C.white,color:tab===t.v?C.white:"#444",fontSize:13,cursor:"pointer",fontWeight:tab===t.v?500:400}}>{t.l}</button>)}</div></Fld></div>
        <div style={{flex:1,minWidth:160}}><Fld label="Nombre"><input style={inp} value={nueva} onChange={e=>setNueva(e.target.value)} placeholder="Nueva categoría..." onKeyDown={e=>e.key==="Enter"&&agregar()}/></Fld></div>
        <button style={btnP} onClick={agregar}>Agregar</button>
      </div>
      {err&&<div style={{color:C.danger,fontSize:13,marginTop:7}}>{err}</div>}
    </Card>
    {TIPOS.map(t=><Card key={t.v} title={`Categorías de ${t.l.toLowerCase()}`}><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{(cats[t.v]||[]).length===0?<Empty text="Sin categorías."/>:(cats[t.v]||[]).map(cat=>{const usada=t.v==="stock"?data.products.some(p=>p.categoria===cat):data.transactions.some(tx=>tx.type===t.v&&tx.category===cat);return <div key={cat} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,background:t.bg,border:`1px solid ${t.border}`}}><span style={{fontSize:13,color:t.color,fontWeight:500}}>{cat}</span>{usada&&<span style={{fontSize:10,color:C.gray}}>en uso</span>}<button onClick={()=>eliminar(t.v,cat)} style={{background:"none",border:"none",cursor:"pointer",color:C.gray,fontSize:15,padding:0,lineHeight:1}}>×</button></div>;})}</div></Card>)}
  </div>;
}

function Graficos({data}){
  const {transactions,products}=data;
  const ing=transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
  const ingB=transactions.filter(t=>t.type==="ingreso").reduce((s,t)=>s+(t.bruto||t.amount),0);
  const egr=transactions.filter(t=>t.type==="egreso").reduce((s,t)=>s+t.amount,0);
  const cats={};transactions.filter(t=>t.type==="egreso").forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.amount;});
  const catArr=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCat=catArr.length>0?Math.max(...catArr.map(c=>c[1])):1;
  const topP=products.slice().sort((a,b)=>(b.sold||0)-(a.sold||0)).slice(0,6);
  const maxSold=topP.length>0?Math.max(...topP.map(p=>p.sold||0),1):1;
  const colors=["#6B1F2A","#9B3040","#C05060","#D4808A","#8B2535","#4A1219"];
  return <div>
    <Ttl>Gráficos</Ttl>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
      <Card title="Ingresos brutos vs netos">
        <svg viewBox="0 0 260 160" style={{width:"100%"}}>
          {[{l:"Bruto",v:ingB,c:C.bordoD},{l:"Neto",v:ing,c:C.success},{l:"Egresos",v:egr,c:C.danger}].map(({l,v,c},i)=>{const bw=(v/Math.max(ingB,egr,1))*200;return <g key={l}><text x="0" y={20+i*48} style={{fontSize:12,fill:C.gray}}>{l}</text><rect x="0" y={26+i*48} width={bw||2} height={18} rx="4" fill={c}/><text x={bw+6} y={39+i*48} style={{fontSize:12,fill:c,fontWeight:600}}>${fmt(v)}</text></g>;})}
          <text x="0" y={158} style={{fontSize:11,fill:C.gray}}>Balance: <tspan fill={(ing-egr)>=0?C.success:C.danger} fontWeight="600">${fmt(ing-egr)}</tspan></text>
        </svg>
      </Card>
      <Card title="Egresos por categoría">{catArr.length===0?<Empty text="Sin egresos."/>:<svg viewBox={`0 0 260 ${catArr.length*38+10}`} style={{width:"100%"}}>{catArr.map(([cat,val],i)=>{const bw=(val/maxCat)*180;return <g key={cat}><text x="0" y={18+i*38} style={{fontSize:11,fill:C.gray}}>{cat.length>16?cat.slice(0,16)+"…":cat}</text><rect x="0" y={24+i*38} width={bw||2} height={14} rx="3" fill={colors[i%colors.length]}/><text x={bw+5} y={35+i*38} style={{fontSize:11,fill:C.bordoD}}>${fmt(val)}</text></g>;})}</svg>}</Card>
      <Card title="Productos más vendidos">{topP.length===0?<Empty text="Sin ventas."/>:<svg viewBox={`0 0 260 ${topP.length*38+10}`} style={{width:"100%"}}>{topP.map((p,i)=>{const bw=((p.sold||0)/maxSold)*180;return <g key={p.id}><text x="0" y={18+i*38} style={{fontSize:11,fill:C.gray}}>{p.name.length>16?p.name.slice(0,16)+"…":p.name}</text><rect x="0" y={24+i*38} width={bw||2} height={14} rx="3" fill={colors[i%colors.length]}/><text x={bw+5} y={35+i*38} style={{fontSize:11,fill:C.bordoD}}>{fmtI(p.sold||0)} u</text></g>;})}</svg>}</Card>
      <Card title="Stock disponible">{products.length===0?<Empty text="Sin productos."/>:(()=>{const sorted=products.slice().sort((a,b)=>b.stock-a.stock).slice(0,8);const maxS=Math.max(...sorted.map(p=>p.stock),1);return <svg viewBox={`0 0 260 ${sorted.length*38+10}`} style={{width:"100%"}}>{sorted.map((p,i)=>{const bw=(p.stock/maxS)*180;const bajo=p.stock<=(p.minStock||5);return <g key={p.id}><text x="0" y={18+i*38} style={{fontSize:11,fill:C.gray}}>{p.name.length>16?p.name.slice(0,16)+"…":p.name}</text><rect x="0" y={24+i*38} width={bw||2} height={14} rx="3" fill={bajo?C.danger:C.success}/><text x={bw+5} y={35+i*38} style={{fontSize:11,fill:bajo?C.danger:C.success}}>{fmtI(p.stock)} u</text></g>;})}</svg>;})()}</Card>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
